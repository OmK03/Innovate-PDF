<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Modern PDF toolkit - merge, split, rotate, protect, and extract text from PDFs" />
    <meta name="author" content="PDF Studio" />
    <title>{% block title %}PDF Studio - Modern PDF Toolkit{% endblock %}</title>
    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
    </div>

    <div class="app-root">
      <header class="app-header">
        <div class="logo">
          <span class="logo-mark">PDF</span>
          <span class="logo-text">Studio</span>
        </div>
        <div class="header-right">
          <span class="tag">Flask · PDF tools</span>
        </div>
      </header>

      <main class="app-main">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-container">
          {% for category, message in messages %}
          <div class="flash flash-{{ category }}">
            <span>{{ message }}</span>
          </div>
          {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
      </main>

      <footer class="app-footer">
        <span>Built with Flask &amp; pypdf</span>
        <span>Open Source · MIT License</span>
      </footer>
    </div>

    <script>
      // Show loading overlay on form submit
      document.addEventListener('DOMContentLoaded', function() {
        const forms = document.querySelectorAll('form');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        forms.forEach(form => {
          form.addEventListener('submit', function(e) {
            // Check if form is valid
            if (form.checkValidity()) {
              loadingOverlay.classList.add('active');
            }
          });
        });

        // Auto-hide flash messages after 5 seconds
        const flashMessages = document.querySelectorAll('.flash');
        flashMessages.forEach(flash => {
          setTimeout(() => {
            flash.style.animation = 'slideOut 0.3s ease-out';
            setTimeout(() => {
              flash.remove();
            }, 300);
          }, 5000);
        });
      });

      // Add slideOut animation
      const style = document.createElement('style');
      style.textContent = `
        @keyframes slideOut {
          from {
            opacity: 1;
            transform: translateY(0);
          }
          to {
            opacity: 0;
            transform: translateY(-10px);
          }
        }
      `;
      document.head.appendChild(style);
    </script>
  </body>
</html>
